litellm_settings:
  drop_params: true
  set_verbose: true

general_settings:
  master_key: <LITELLM_MASTER_KEY>
  otel: false
  enable_pre_call_checks: true
  completion_model: deepseek-v3.2
  num_retries: 3
  request_timeout: 600
  max_tokens: 8192
  temperature: 0.7

environment_variables:
  MAAS_API_KEY: <MAAS_API_KEY>